<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Chat for Booking {{ booking.id }}</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

  <div class="container">
    <div class="mb-3">
      <a href="https://www.google.com/maps/dir/?api=1&destination={{ lat }},{{ lon }}" target="_blank" class="btn btn-primary">
        📍 Directions to Job
      </a>
    </div>

    <div id="chat-window" class="border p-3 mb-3" style="height:300px; overflow-y:auto;"></div>
    <form id="chat-form" class="d-flex gap-2">
      <input id="message" class="form-control" placeholder="Type a message..." required />
      <button class="btn btn-success">Send</button>
    </form>
  </div>

  <script>
    const chatWindow = document.getElementById("chat-window"),
          form = document.getElementById("chat-form"),
          input = document.getElementById("message");

    function appendMsg(who, text) {
      let div = document.createElement("div");
      div.className = who === "me" ? "text-end text-bold" : "text-start";
      div.textContent = text;
      chatWindow.appendChild(div);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    form.addEventListener("submit", e => {
      e.preventDefault();
      appendMsg("me", input.value);
      input.value = "";
      // TODO: send via AJAX or WebSocket
    });

    // TODO: add reload/polling for incoming messages
  </script>
</body>
</html>
