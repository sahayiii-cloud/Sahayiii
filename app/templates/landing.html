<!-- app/templates/landing.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <title>Sahayi • Connect with Skilled Workers</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    html, body { margin:0; padding:0; width:100%; height:100%; font-family:'Segoe UI', sans-serif; overflow:hidden; }
    #particles-js { position:absolute; width:100%; height:100%; background:linear-gradient(135deg,#f3e5f5,#e0f7fa); z-index:-1; }
    .landing { position:relative; display:flex; align-items:center; justify-content:center; height:100vh; flex-direction:column; text-align:center; color:#333; padding:20px; }
    .title { font-size:2.5rem; font-weight:bold; color:#333; letter-spacing:3px; word-break:break-word; }
    .title i { color:#ff6f61; animation:spin 6s linear infinite; }
    @keyframes spin { 0%{transform:rotate(0)} 100%{transform:rotate(360deg)} }
    .subtitle { font-size:1.1rem; margin-top:12px; margin-bottom:25px; color:#444; }
    .btn-wrap { display:flex; gap:16px; flex-wrap:wrap; justify-content:center; }
    .btn-custom { padding:12px 20px; font-size:1rem; border-radius:8px; text-transform:uppercase; transition:all .3s ease; }
    .btn-custom:hover { transform:scale(1.05); box-shadow:0 8px 20px rgba(0,0,0,.2); }
    .btn-hire { background-color:#007bff; color:white; border:none; }
    .btn-work { background:transparent; color:#ff6f61; border:2px solid #ff6f61; }
    .btn-work:hover { background-color:#ff6f61; color:white; }

    @media (max-width:576px) {
      .title { font-size:2rem; letter-spacing:1px; }
      .subtitle { font-size:1rem; padding:0 10px; }
      .btn-custom { width:100%; padding:10px; font-size:.95rem; }
      .btn-wrap { flex-direction:column; gap:12px; width:100%; padding:0 20px; }
    }
  </style>
</head>
<body>
  <div id="particles-js"></div>
  <div class="landing">
    <div class="title">
      <i class="fas fa-screwdriver-wrench"></i> S A H A Y I <i class="fas fa-wrench"></i>
    </div>
    <div class="subtitle">Find trusted workers. Offer your skills. Build the future together.</div>
    <div class="btn-wrap">
      <a href="/login" class="btn btn-hire btn-custom"><i class="fas fa-sign-in-alt"></i> Login</a>
      <a href="/sign_up" class="btn btn-work btn-custom"><i class="fas fa-user-plus"></i> Sign Up</a>
    </div>
  </div>
</body>
</html>
