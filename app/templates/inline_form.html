<!DOCTYPE html>
<html lang="en">
<head>
  <title>Search for Sahayi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; margin: 0; background-color: #f2f2f2; }
    .form-container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1); position: relative; }
    label { font-weight: bold; margin-bottom: 5px; display: block; }
    input[type="text"] { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    input[type="submit"] { background-color: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; }
    input[type="submit"]:hover { background-color: #0056b3; }
    .suggestions { position: absolute; width: 100%; background: white; border: 1px solid #ccc; border-radius: 5px; max-height: 200px; overflow-y: auto; display: none; z-index: 1000; }
    .suggestions div { padding: 10px; cursor: pointer; }
    .suggestions div:hover { background-color: #e9ecef; }
  </style>
</head>
<body>
  <div class="form-container">
    <h2 class="text-center">🔍 Search for Sahayi</h2>
    <form method="POST" action="/provide_job" autocomplete="off">
      <label for="job_type">What help do you need?</label>
      <input type="text" name="job_type" id="job_type" placeholder="e.g., plumber, electrician" required>
      <div id="suggestions" class="suggestions"></div>
      <input type="submit" value="Search Workers Near You">
    </form>
  </div>

  <script>
    const skills = {{ skill_names|tojson }};
    const input = document.getElementById('job_type');
    const box = document.getElementById('suggestions');

    input.addEventListener('input', () => {
      const query = input.value.toLowerCase().trim();
      box.innerHTML = '';
      if (!query) { box.style.display = 'none'; return; }

      const filtered = skills.filter(s => s.includes(query)).slice(0, 8);
      if (!filtered.length) { box.style.display = 'none'; return; }

      filtered.forEach(skill => {
        const div = document.createElement('div');
        div.textContent = skill;
        div.onclick = () => { input.value = skill; box.style.display = 'none'; };
        box.appendChild(div);
      });
      box.style.display = 'block';
    });

    document.addEventListener('click', (e) => {
      if (!box.contains(e.target) && e.target !== input) {
        box.style.display = 'none';
      }
    });
  </script>
</body>
</html>
