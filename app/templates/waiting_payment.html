<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>⏳ Waiting for Payment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="/static/js/theme.js" defer></script>
<link rel="stylesheet" href="/static/css/paywaiting.css">

<!-- Inject backend data -->
<script>
  window.BOOKING_TOKEN = "{{ booking.token }}";
  window.REMAINING_TIME = {{ remaining|int if remaining else 0 }};
</script>

<script src="/static/js/paywaiting.js" defer></script>

</head>
<body>

  <div class="waiting-card text-center">
    <h2>⏳ Waiting for Token Payment</h2>
    <p class="message">Hang tight while the job giver completes the token payment.</p>
    <p class="message">You will be notified once payment is done. You can begin your work then.</p>
    <div class="timer" id="timer">--:--</div>
  </div>

  <!-- Payment Received Modal -->
  <div class="modal fade" id="tokenReceivedModal" tabindex="-1" aria-labelledby="tokenReceivedModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-success shadow">
        <div class="modal-header text-white">
          <h5 class="modal-title" id="tokenReceivedModalLabel">🎉 Payment Received!</h5>
        </div>
        <div class="modal-body text-center">
          <p class="fs-5">✅ The job giver has successfully paid the token.</p>
          <p>You may now begin your work. 💼</p>
        </div>
        <div class="modal-footer justify-content-center">
          <button type="button" class="btn btn-success px-4" onclick="window.location.replace('/')">OK</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
