<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">

  <title>{% block title %}Job Connect{% endblock %}</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Theme -->
  <link rel="stylesheet" href="/static/css/theme.css">

  <!-- Page specific CSS -->
  {% block head %}{% endblock %}
</head>

<body>

  <!-- ================= TOP BAR / NAV / LOCATION ================= -->
  <!-- Paste your whole top-left stack + top-right-actions here -->
  {% include "partials/topbar.html" ignore missing %}
  <!-- Or paste directly if you don't use partials -->

  <!-- ================= MAIN CONTENT ================= -->
  <main id="main-content">
    {% block content %}{% endblock %}
  </main>


  <!-- ================= SCRIPTS ================= -->

  <script src="/static/js/theme.js"></script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  {% block scripts %}{% endblock %}

</body>
</html>
