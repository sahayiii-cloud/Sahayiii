<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Worker Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="/static/js/theme.js" defer></script>
  <link rel="stylesheet" href="/static/css/cw.css">
  <script src="/static/js/cw.js" defer></script>
</head>
<body>

<div class="container mt-5">
  <div class="card shadow-lg p-4 rounded-4">
    <h3 class="text-center text-primary mb-3">Worker Profile Creation</h3>

    <!-- Progress bar -->
    <div class="progress mb-4">
      <div id="progressBar" class="progress-bar bg-primary" style="width: 20%;"></div>
    </div>

    <form id="createProfileForm" action="/create_worker_profile" method="POST" enctype="multipart/form-data">


      <!-- STEP 1: Live Photo -->
      <div class="step-container active">
        <h5 class="mb-3">📸 Capture Your Photo</h5>
        <input type="file" name="photo" accept="image/*" capture="user" class="form-control" required>
        <div class="step-btns d-flex justify-content-end">
          <button type="button" class="btn btn-primary next">Next ➡️</button>
        </div>
      </div>

      <!-- STEP 2: Bank Details -->
      <div class="step-container">
        <h5 class="mb-3">🏦 Bank Details</h5>
        <input type="text" name="bank_name" placeholder="Bank Name" class="form-control mb-2" required>
        <input type="text" name="branch" placeholder="Branch" class="form-control mb-2" required>
        <input type="text" name="ifsc" placeholder="IFSC Code" class="form-control mb-2" required>
        <input type="text" name="account_number" placeholder="Account Number" class="form-control mb-2" required>
        <div class="step-btns d-flex justify-content-between">
          <button type="button" class="btn btn-secondary prev">⬅️ Back</button>
          <button type="button" class="btn btn-primary next">Next ➡️</button>
        </div>
      </div>

      <!-- STEP 3: ID Proof -->
      <div class="step-container">
        <h5 class="mb-3">🪪 Upload ID Proof</h5>
        <label>Aadhaar / Voter ID / DL (Front)</label>
        <input type="file" name="id_front" accept="image/*" class="form-control mb-2" required>
        <label>Back Side</label>
        <input type="file" name="id_back" accept="image/*" class="form-control mb-2" required>
        <div class="step-btns d-flex justify-content-between">
          <button type="button" class="btn btn-secondary prev">⬅️ Back</button>
          <button type="button" class="btn btn-primary next">Next ➡️</button>
        </div>
      </div>

      <!-- STEP 4: PAN Card -->
      <div class="step-container">
        <h5 class="mb-3">🧾 Upload PAN Card</h5>
        <input type="file" name="pan_card" accept="image/*" class="form-control mb-2" required>
        <div class="step-btns d-flex justify-content-between">
          <button type="button" class="btn btn-secondary prev">⬅️ Back</button>
          <button type="button" class="btn btn-primary next">Next ➡️</button>
        </div>
      </div>

      <!-- STEP 5: Profile Details -->
      <div class="step-container">
        <h5 class="mb-3">👤 Profile Details</h5>
        <div class="row g-3">
          <div class="col-md-6">
            <input type="number" name="age" placeholder="Age" class="form-control" required>
          </div>
          <div class="col-md-6">
            <select name="gender" class="form-select" required>
              <option value="" disabled selected>Select Gender</option>
              <option>Male</option>
              <option>Female</option>
            </select>
          </div>
          <div class="col-md-6">
            <input type="text" name="qualification" placeholder="Qualification" class="form-control" required>
          </div>
          <div class="col-md-6">
            <input type="text" name="experience" placeholder="Experience" class="form-control" required>
          </div>
          <div class="col-12">
            <textarea name="about" placeholder="About Me" rows="3" class="form-control" required></textarea>
          </div>
        </div>

        <h6 class="mt-4">🔧 Skills & Rates</h6>
        <div id="skills-section">

          <!-- initial skill row (server-renderable) -->
          <div class="skill-row d-flex gap-2 mt-2 align-items-start">
            <input type="text" class="form-control" name="skills[]" placeholder="Skill" required>

            <!-- Skill Category -->
            <select class="form-select wf-category-select" name="skill_categories[]" required>
              <option value="" selected disabled>Select category</option>
              <option>Plumbing</option>
              <option>Electrical</option>
              <option>Cleaning</option>
              <option>Carpentry</option>
              <option>Construction</option>
              <option>Cooking</option>
              <option>Fitness</option>
              <option>Sahayi from Home</option>
              <option>Other</option>
            </select>

            <!-- Rate (hidden for WFH) -->
            <input type="number" class="form-control wf-rate-input" name="rates[]" placeholder="Rate (₹)" required min="0">

            <!-- Rate type (hidden for WFH) -->
            <select class="form-select wf-rate-type" name="rate_types[]" required>
              <option value="per hour">₹/Hour</option>
              <option value="per job">₹/Job</option>
              <option value="per kilogram">₹/Kilogram</option>
              <option value="custom">₹/Custom</option>
            </select>

            <!-- WORK-FROM-HOME OPTIONS (hidden unless category selected) -->
            <div class="wf-options" style="display:none;">
              <select class="form-select wf-mode-select" name="wf_mode[]">
                <option value="everywhere" selected>Everywhere</option>
                <option value="radius">Custom km</option>
              </select>
              <input type="number" class="form-control wf-radius-input mt-1" name="wf_radius[]" placeholder="km" min="0" style="display:none;">
              <!-- final effective scope sent to server: "everywhere" or numeric string or empty -->
              <input type="hidden" class="wf-scope" name="wf_scope[]" value="">
            </div>


          </div>

        </div>
        <button type="button" class="btn btn-outline-secondary mt-2" onclick="addSkill()">➕ Add Skill</button>


        <div class="step-btns d-flex justify-content-between mt-4">
          <button type="button" class="btn btn-secondary prev">⬅️ Back</button>
          <button type="submit" class="btn btn-success">✅ Submit Profile</button>
        </div>
      </div>
    </form>
  </div>
</div>

</body>
</html>
